name: Java CI/CD Pipeline with Maven

# Define trigger event: automatically run when push or pull request to main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # Run the pipeline on a clean Ubuntu VM provided by GitHub
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout code from repository to VM
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Configure Java JDK 17 and enable caching to speed up Maven dependency downloads
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # Step 3: Grant execute permission for mvnw (since the original file was created on Windows)
    - name: Grant execute permission for mvnw
      run: chmod +x Java-Login-App/mvnw

    # Step 4: Build and package the .war file in the Java-Login-App directory
    - name: Build and Package with Maven
      run: cd Java-Login-App && ./mvnw clean package

    # Step 5: Package and upload the .war file to GitHub's Artifact storage
    - name: Upload Build Artifact (.war)
      uses: actions/upload-artifact@v4
      with:
        name: dptweb-application
        path: Java-Login-App/target/*.war

    # Optional Step 6: Deploy built artifact to AWS S3 bucket
    # To enable this step, set up the following repository secrets in GitHub:
    # - AWS_ACCESS_KEY_ID
    # - AWS_SECRET_ACCESS_KEY
    # - AWS_REGION (e.g., us-east-1)
    # - AWS_S3_BUCKET_NAME (the bucket created by Terraform)
    - name: Configure AWS Credentials
      if: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

    - name: Upload Artifact to AWS S3
      if: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_S3_BUCKET_NAME != '' }}
      run: |
        aws s3 cp Java-Login-App/target/*.war s3://${{ secrets.AWS_S3_BUCKET_NAME }}/dptweb-1.0.war

